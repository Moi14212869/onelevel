<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classement - OneLevel Studio</title>
<style>
    body { background-color:#1e1e2f; color:#fff; font-family:'Roboto', sans-serif; text-align:center; padding:50px; }
    .back-button { position: fixed; top: 15px; left: 15px; padding: 10px 16px; background-color: #181826; color: #fff; text-decoration: none; border: 2px solid #ff5c5c; border-radius: 8px; font-family: 'Roboto', sans-serif; font-size: 14px; transition: all 0.2s ease; z-index: 1000; }
    .back-button:hover { background-color: #ff5c5c; color: #181826; }
    table { margin:0 auto; border-collapse: collapse; width:80%; color:#fff; }
    th, td { padding:10px; border-bottom:2px solid #ff5c5c; text-align:center; }
    .footer { margin-top: 50px; padding: 20px; border-top: 2px solid #ff5c5c; background-color: #181826; font-size: 14px; }
    .footer a { color: #ff5c5c; text-decoration: none; font-weight: bold; }
    .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<a href="https://moi14212869.github.io/onelevel/" class="back-button">← Retour</a>
<h1>Classement des joueurs</h1>
<table id="leaderboardTable">
    <thead>
        <tr>
            <th>Rang</th>
            <th>Nom</th>
            <th>Score</th>
        </tr>
    </thead>
    <tbody>
        <tr><td colspan="3">Chargement...</td></tr>
    </tbody>
</table>
<footer class="footer">
    <p>
        © 2026 OneLevel Studio |
        <a href="https://moi14212869.github.io/onelevel/liderboard/rules/">
            Comment le score est calculé
        </a>
    </p>
</footer>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAtox4-sYkd_YLYzZzjih0oak9dpHftVv4",
    authDomain: "onelevel-f94a1.firebaseapp.com",
    projectId: "onelevel-f94a1",
    storageBucket: "onelevel-f94a1.firebasestorage.app",
    messagingSenderId: "31193753415",
    appId: "1:31193753415:web:56cd82ea8aeff02bed0e62",
    measurementId: "G-E6K903XDTZ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function displayLeaderboard() {
    const querySnapshot = await getDocs(collection(db, "players"));
    let players = [];
    querySnapshot.forEach(doc => players.push(doc.data()));
    players.sort((a,b) => b.score - a.score);

    const tbody = document.querySelector("#leaderboardTable tbody");
    tbody.innerHTML = "";
    players.forEach((player, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${index+1}</td><td>${player.username}</td><td>${player.score}</td>`;
        tbody.appendChild(tr);
    });
}

window.addEventListener("load", displayLeaderboard);
</script>
</body>
</html>
