<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>JS Playground</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs/loader.js"></script>

<style>
:root {
    --bg: #0f172a;
    --panel: #111827;
    --accent: #3b82f6;
    --accent-dark: #1e40af;
    --text: #e5e7eb;
    --muted: #9ca3af;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    padding: 16px;
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    background: rgba(17, 24, 39, 0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.container {
    flex: 1;
    display: flex;
    gap: 12px;
    padding: 12px;
}

#console {
    width: 40%;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 13px;
    white-space: pre-wrap;
    color: #00ff00;
    text-shadow: 0 0 5px #00ff00;
}

#editorContainer {
    width: 60%;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
}

.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    background: rgba(17, 24, 39, 0.6);
    border-top: 1px solid rgba(255,255,255,0.1);
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
}

button:hover {
    background: var(--accent-dark);
    transform: translateY(-1px);
}

button:active {
    transform: scale(0.98);
}

.empty {
    color: var(--muted);
    text-align: center;
    margin-top: 20px;
}

.separator {
    margin: 10px 0;
    border-top: 1px solid rgba(255,255,255,0.2);
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover { background: #475569; }
</style>
</head>
<body>

<header>⚡ JS Playground</header>

<div class="container">
    <div id="console"><div class="empty">Console vide...</div></div>
    <div id="editorContainer"></div>
</div>

<div class="controls">
    <button onclick="runCode()">▶ Exécuter (Ctrl+Entrée)</button>
    <button onclick="saveCode()">💾 Enregistrer</button>
    <button onclick="resetConsole()">🧹 Reset console</button>
</div>

<script>
require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs' }});

let score = parseInt(localStorage.getItem("score")) || 0;
const consoleDiv = document.getElementById("console");

require(['vs/editor/editor.main'], function () {
    window.editor = monaco.editor.create(document.getElementById('editorContainer'), {
        value: `console.log("Hello World !");`,
        language: 'javascript',
        theme: 'vs-dark',
        automaticLayout: true,
        minimap: { enabled: false }
    });

    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, runCode);
});

function runCode() {
    score += 10;
    localStorage.setItem("score", score);

    if (consoleDiv.innerHTML.trim() !== "" && !consoleDiv.querySelector(".empty")) {
        const sep = document.createElement("div");
        sep.className = "separator";
        consoleDiv.appendChild(sep);
    } else {
        consoleDiv.innerHTML = "";
    }

    const originalConsoleLog = console.log;

    console.log = function(...args) {
        const line = args.map(arg => 
            typeof arg === "object" ? JSON.stringify(arg, null, 2) : String(arg)
        ).join(" ");

        const div = document.createElement("div");
        div.textContent = line;
        consoleDiv.appendChild(div);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    };

    try {
        eval(editor.getValue());
    } catch (err) {
        const errorDiv = document.createElement("div");
        errorDiv.textContent = "Erreur : " + err.message;
        errorDiv.style.color = "#f87171";
        consoleDiv.appendChild(errorDiv);
    } finally {
        console.log = originalConsoleLog;
    }
}

function resetConsole() {
    consoleDiv.innerHTML = '<div class="empty">Console vide...</div>';
}

function saveCode() {
    const code = editor.getValue();
    const blob = new Blob([code], { type: "text/javascript" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "script.js";
    a.click();

    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
